<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1238"/>
      <stop offset="1" stop-color="#0c0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b6bff"/>
      <stop offset="1" stop-color="#ff5c8a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- detective hat + mask motif -->
  <g transform="translate(256 250)">
    <!-- brim -->
    <ellipse cx="0" cy="46" rx="150" ry="34" fill="url(#accent)"/>
    <!-- hat dome -->
    <path d="M-104 40 C-104 -70 104 -70 104 40 Z" fill="url(#accent)"/>
    <!-- band -->
    <rect x="-104" y="22" width="208" height="26" rx="13" fill="#0c0a1a" opacity="0.45"/>
    <!-- eyes -->
    <circle cx="-44" cy="6" r="18" fill="#0c0a1a"/>
    <circle cx="44" cy="6" r="18" fill="#0c0a1a"/>
    <circle cx="-38" cy="0" r="6" fill="#fff" opacity="0.9"/>
    <circle cx="50" cy="0" r="6" fill="#fff" opacity="0.9"/>
  </g>
  <!-- question mark -->
  <text x="256" y="430" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="#fff" text-anchor="middle">?</text>
</svg>
